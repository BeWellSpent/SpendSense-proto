syntax = "proto3";

package wellspent.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/BeWellSpent/wellspent-backend/gen/wellspent/v1;wellspentv1";

service PlaidService {
  rpc CreateLinkToken(CreateLinkTokenRequest) returns (CreateLinkTokenResponse);
  rpc ExchangePublicToken(ExchangePublicTokenRequest) returns (ExchangePublicTokenResponse);
  rpc GetPlaidConnections(GetPlaidConnectionsRequest) returns (GetPlaidConnectionsResponse);
  rpc DisconnectPlaid(DisconnectPlaidRequest) returns (DisconnectPlaidResponse);
  // Refreshes the account list for an existing connection — call after a
  // Link "update mode" session (e.g. account selection) completes, since
  // update mode doesn't return a public_token to exchange.
  rpc RefreshPlaidAccounts(RefreshPlaidAccountsRequest) returns (RefreshPlaidAccountsResponse);
}

// ─── Shared message ───────────────────────────────────────────────────────────

message PlaidConnection {
  string id = 1;
  string institution_id = 2;
  string institution_name = 3;
  // active | disconnected | error
  string status = 4;
  google.protobuf.Timestamp last_synced_at = 5;
  string budget_profile_id = 6;
}

// ─── CreateLinkToken ──────────────────────────────────────────────────────────

message CreateLinkTokenRequest {
  // Budget profile that imported transactions will be written to.
  string budget_profile_id = 1;
  // Optional. If set, requests a Link token in "update mode" with account
  // selection enabled for this existing connection (add/remove accounts on
  // an already-connected item) instead of a fresh connect flow.
  string connection_id = 2;
}

message CreateLinkTokenResponse {
  string link_token = 1;
  // ISO 8601 expiration time of the link token.
  string expiration = 2;
}

// ─── ExchangePublicToken ──────────────────────────────────────────────────────

message ExchangePublicTokenRequest {
  string public_token = 1;
  string budget_profile_id = 2;
}

message ExchangePublicTokenResponse {
  PlaidConnection connection = 1;
}

// ─── GetPlaidConnections ──────────────────────────────────────────────────────

message GetPlaidConnectionsRequest {
  // Optional. If set, filters to connections for a specific budget profile.
  string budget_profile_id = 1;
}

message GetPlaidConnectionsResponse {
  repeated PlaidConnection connections = 1;
}

// ─── DisconnectPlaid ──────────────────────────────────────────────────────────

message DisconnectPlaidRequest {
  // UUID of the plaid_item row.
  string connection_id = 1;
}

message DisconnectPlaidResponse {}

// ─── RefreshPlaidAccounts ──────────────────────────────────────────────────────

message RefreshPlaidAccountsRequest {
  // UUID of the plaid_item row.
  string connection_id = 1;
}

message RefreshPlaidAccountsResponse {
  PlaidConnection connection = 1;
}
